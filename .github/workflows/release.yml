name: Release

# 仅当推送形如 v1.2.3 的版本标签时才构建并发布。
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.9'

      - name: Build release binaries
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="$(git rev-parse --short=7 HEAD)"
          echo "Version=${VERSION} BuildTime=${BUILD_TIME} GitCommit=${GIT_COMMIT}"
          LDFLAGS="-s -w -X mcpeserverproxy/internal/logger.Version=${VERSION} -X mcpeserverproxy/internal/logger.BuildTime=${BUILD_TIME} -X mcpeserverproxy/internal/logger.GitCommit=${GIT_COMMIT}"
          mkdir -p dist-release
          build() {
            goos="$1"; goarch="$2"; ext="$3"
            name="mcpeserverproxy-${VERSION}-${goos}-${goarch}"
            echo "Building ${name}${ext}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -tags=with_utls -trimpath -ldflags "${LDFLAGS}" -o "${name}${ext}" ./cmd/mcpeserverproxy
            if [ "${goos}" = "windows" ]; then
              zip -qj "dist-release/${name}.zip" "${name}${ext}"
            else
              tar -czf "dist-release/${name}.tar.gz" "${name}${ext}"
            fi
            rm -f "${name}${ext}"
          }
          build linux   amd64 ""
          build linux   arm64 ""
          build windows amd64 ".exe"
          build darwin  amd64 ""
          build darwin  arm64 ""
          (cd dist-release && sha256sum * > SHA256SUMS.txt)
          ls -la dist-release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist-release/*
